name: Publish Trellis Core

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetches all tags and history so the release event knows where it is
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          # We explicitly map the username/password here to bypass settings.xml issues
          server-username: GITHUB_ACTOR
          server-password: MAVEN_PUBLISH_TOKEN
          cache: maven
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          MAVEN_PUBLISH_TOKEN: ${{ secrets.MAVEN_PUBLISH_TOKEN }}

      - name: Deploy to GitHub Packages
        run: |
          mvn --batch-mode deploy -DskipTests \
            -Dgithub.packages.owner="niksensei2000" \
            -Dgithub.packages.repo="trellis"
        env:
          # Use the PAT secret primarily
          GITHUB_TOKEN: ${{ secrets.MAVEN_PUBLISH_TOKEN }}