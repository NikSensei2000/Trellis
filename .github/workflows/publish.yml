name: Publish Trellis Core

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  # Forces actions to use a stable node version
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # If manual run, use main; if release, use the release tag
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # This automatically creates a settings.xml with a server id='github'
          server-id: github
          settings-path: ${{ github.workspace }}
          cache: maven

      - name: Deploy to GitHub Packages
        run: |
          # Convert owner and repo to lowercase (GitHub Requirement)
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          echo "Deploying to $OWNER_LC/$REPO_LC"
          
          # Run deploy using the settings.xml generated by setup-java
          mvn --batch-mode deploy -DskipTests \
            -s ${{ github.workspace }}/settings.xml \
            -Dgithub.packages.owner="$OWNER_LC" \
            -Dgithub.packages.repo="$REPO_LC"
        env:
          # Use your PAT if you added it to secrets, otherwise fallback to GITHUB_TOKEN
          NODE_AUTH_TOKEN: ${{ secrets.MAVEN_PUBLISH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.MAVEN_PUBLISH_TOKEN || secrets.GITHUB_TOKEN }}