name: Publish Trellis Core

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Manual runs always build and deploy `main`, even if another branch was selected in the UI.
      # Published releases still check out the tag ref (`github.ref`) so the artifact matches the release.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      # server-id must match <distributionManagement><repository><id> in pom.xml (github).
      # Password must be github.token so Basic auth is valid for this repository’s Packages scope.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ github.token }}

      # GitHub Packages Maven URLs must use lowercase OWNER/REPO in the path (see GitHub docs for the Maven
      # registry). Mixed-case owners (e.g. NikSensei2000) often yield 401 on metadata transfer.
      # GITHUB_TOKEN can only publish to the package namespace for this repository.
      - name: Deploy to GitHub Packages
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          mvn --batch-mode deploy -DskipTests \
            -Dgithub.packages.owner="$OWNER_LC" \
            -Dgithub.packages.repo="$REPO_LC"
        env:
          GITHUB_TOKEN: ${{ github.token }}
