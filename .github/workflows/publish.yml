name: Publish Trellis Core

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Uses main for manual runs, or the specific tag for releases
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # This ID MUST match the <id> in your pom.xml <distributionManagement>
          server-id: github
          cache: maven

      - name: Deploy to GitHub Packages
        run: |
          # The docs require lowercase owner and repo names for the URL.
          # We force these via Maven properties to override any POM defaults.
          mvn --batch-mode deploy -DskipTests \
            -Dgithub.packages.owner="niksensei2000" \
            -Dgithub.packages.repo="trellis"
        env:
          # GitHub Actions provides GITHUB_TOKEN automatically.
          # If it fails, use the MAVEN_PUBLISH_TOKEN secret you created.
          GITHUB_TOKEN: ${{ secrets.MAVEN_PUBLISH_TOKEN || secrets.GITHUB_TOKEN }}