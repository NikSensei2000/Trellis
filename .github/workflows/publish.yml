name: Publish Trellis Core

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Define variables here so EVERY step can see them
    env:
      MAVEN_USERNAME: ${{ github.actor }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PUBLISH_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          # setup-java writes these as environment variable placeholders in settings.xml
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          cache: maven

      - name: Deploy to GitHub Packages
        run: |
          mvn --batch-mode deploy -DskipTests \
            -Dgithub.packages.owner="niksensei2000" \
            -Dgithub.packages.repo="trellis"